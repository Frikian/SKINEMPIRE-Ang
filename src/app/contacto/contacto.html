<section class="section">
  <img class="sectionImg" src="../assets/headerContacto.jpg" alt="foto header">
  <div class="sectionText">
    <h1>Contáctanos</h1>
    <p>¿Tienes dudas, sugerencias o necesitas ayuda? Estamos aquí para ti.</p>
  </div>
</section>
<main class="contacto-container">
  <div class="info-contacto">
    <h2>Información</h2>
    <p>Email: soporte@skinempires.com</p>
    <p>Teléfono: +34 912 345 678</p>
    <p>Horario: Lunes a Viernes de 9:00 a 18:00</p>
  </div>
  <form class="formulario-contacto" (ngSubmit)="enviarFormulario()">
    <h2>Envíanos un mensaje</h2>
    <select [(ngModel)]="motivo" name="motivo" required>
      <option value="" disabled selected>Motivo</option>
      <option value="1">Soporte</option>
      <option value="2">Sugerencias</option>
      <option value="3">Otro</option>
    </select>
    <input type="text" placeholder="Nombre" [(ngModel)]="nombre" name="nombre" required>
    <input type="email" placeholder="Correo electrónico" [(ngModel)]="email" name="email" required>
    <textarea placeholder="Escribe tu mensaje..." [(ngModel)]="mensaje" name="mensaje" required></textarea>

    <!-- CAPTCHA obligatori -->
    <app-captcha #captchaRef (captchaValidated)="onCaptchaValidated($event)"></app-captcha>
    <p class="captcha-required-hint" *ngIf="captchaRequired">
      &#9888; Captcha incorrecte.
    </p>

    <button type="submit" [disabled]="enviando">
      {{ enviando ? 'Enviando...' : 'Enviar' }}
    </button>
    <p class="feedback-exito" *ngIf="exito"> Enviat.</p>
    <p class="feedback-error" *ngIf="error"> Error al enviar. Inténtalo de nuevo.</p>
  </form>
</main>
<section class="mapa">
  <iframe src="https://www.google.com/maps/embed?..." width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</section>
