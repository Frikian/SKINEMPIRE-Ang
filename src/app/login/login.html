<h1>Inici de sessió</h1>
<div class="signup-form">
  <form (submit)="enviarLogin(); $event.preventDefault()">
    <label for="usuari">Usuari</label>
    <input type="text" name="usuari" id="usuari" placeholder="Guaperes_777" [(ngModel)]="nombrem" required>

    <label for="pass">Contrasenya</label>
    <input type="password" name="pass" id="pass" placeholder="Minim 8 caracters" [(ngModel)]="contrasena" required>
    <br>
    <br>
    <input type="submit" value="Inicia sessió" name="login">
    {{mensaje}}
  </form>
</div>
<footer>
  <h3>
    No tens compte?
    <a routerLink="/register">
      <input type="button" value="Registra't aquí">
    </a>
  </h3>

  <h3>
    Contrasenya oblidada?
    <a routerLink="/forgot-password">
      <input type="button" value="Restableix-la aqui">
    </a>
  </h3>
</footer>
