<div class="formulari-sencer">
  <h1>Registre el teu compte</h1>
  <div class="signup-form">
    <form>
      <label for="usuari">Usuari</label>
      <input [(ngModel)]="nom" class="registerformsectioninput" type="text" name="usuari" id="usuari" required>

      <label for="email">Correu</label>
      <input [(ngModel)]="email" class="registerformsectioninput" type="email" name="email" id="email" required>

      <label for="pass">Contrasenya</label>
      <input [(ngModel)]="contrasena" class="registerformsectioninput" type="password" name="pass" id="pass" required>

      <input type="button" value="Registrar" (click)="enviarRegistro()">

      <p>{{mensaje}}</p>
    </form>
  </div>
</div>
<footer>
  <h3>
    Ja tens compte?
    <a routerLink="/login">
      <input type="button" value="Inicia sessió aqui">
    </a>
  </h3>
  <p><a href="register"></a></p>
</footer>

<div class=""></div>
