<div class="formulari-sencer">
  <h1>Registre el teu compte</h1>
  <div class="signup-form">
    <form (submit)="enviarLogin(); $event.preventDefault()">
      <label for="usuari">Usuari</label>
      <input class="registerformsectioninput" type="text" name="usuari" id="usuari" placeholder="Guaperes_777" required>

      <label type="email">Correu</label>
      <input class="registerformsectioninput" type="email" name="email" id="email" placeholder="xxx@gmail.com" required>
      <label for="pass">Contrasenya</label>
      <input class="registerformsectioninput" type="password" name="pass" id="pass" placeholder="Minim 8 caracters" required>

      <input  type="submit">
      {{mensaje}}
    </form>
  </div>
  <footer>
    <h3>
      Ja tens compte?
      <a routerLink="/login">
        <input type="button" value="Inicia sessió aqui">
      </a>
    </h3>
    <p><a href="register"></a></p>
  </footer>
</div>

<div class=""></div>
