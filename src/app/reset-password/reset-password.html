<div class="formulari-sencer">
  <h1>Nova contrasenya</h1>
  <div class="signup-form">

    <div *ngIf="!completat">
      <form>
        <label for="nova">Nova contrasenya</label>
        <input [(ngModel)]="novaContrasena" type="password" name="nova" id="nova"
               placeholder="Mínim 8 caràcters" required>

        <label for="confirmar">Confirma la contrasenya</label>
        <input [(ngModel)]="confirmarContrasena" type="password" name="confirmar" id="confirmar"
               placeholder="Repeteix la contrasenya" required>

        <input type="button" value="Canviar contrasenya" (click)="canviarContrasena()">
        <p class="mensaje-reset">{{ mensaje }}</p>
      </form>
    </div>

    <div *ngIf="completat" class="completat-box">
      <p class="completat-text">✅ Contrasenya canviada correctament!</p>
      <p class="info-text">Redirigint a l'inici de sessió...</p>
    </div>

  </div>
</div>

<footer>
  <h3>
    <a routerLink="/login">
      <input type="button" value="Torna a iniciar sessió">
    </a>
  </h3>
</footer>
