<div class="formulari-sencer">
  <h1>Restablir contrasenya</h1>
  <div class="signup-form">
    <div *ngIf="!enviat">
      <p class="info-text">Introdueix el teu nom d'usuari i el teu correu per rebre l'enllaç de restabliment.</p>
      <form>
        <label for="nom">Nom d'usuari</label>
        <input [(ngModel)]="nom" type="text" name="nom" id="nom" required>

        <label for="email">Correu electrònic</label>
        <input [(ngModel)]="email" type="email" name="email" id="email" required>

        <input type="button" value="Enviar enllaç" (click)="enviarSolicitud()">
        <p class="mensaje-forgot">{{ mensaje }}</p>
      </form>
    </div>

    <div *ngIf="enviat" class="enviat-box">
      <p class="enviat-text">✅ Correu enviat correctament!</p>
      <p class="info-text">Comprova la teva safata d'entrada i segueix l'enllaç per restablir la contrasenya.</p>
    </div>
  </div>
</div>

<footer>
  <h3>
    Recordes la contrasenya?
    <a routerLink="/login">
      <input type="button" value="Torna a iniciar sessió">
    </a>
  </h3>
</footer>
